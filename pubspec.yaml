name: book_shelf
description: Книжная полка — читалка EPUB, FB2, MOBI
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  file_picker: ^8.1.4
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  path: ^1.9.0
  uuid: ^4.5.1
  intl: ^0.19.0
  crypto: ^3.0.6
  archive: ^4.0.7
  xml: ^6.5.0
  fb2_parse: ^1.0.1
  dart_mobi: ^1.0.2
  flutter_html: ^3.0.0-beta.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
